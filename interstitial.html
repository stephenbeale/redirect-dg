<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect DG — Privacy Warning</title>
  <link rel="stylesheet" href="interstitial.css">
</head>
<body>
  <div class="container">
    <div class="shield-icon">
      <svg viewBox="0 0 64 64" width="72" height="72" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4 L56 14 L56 30 Q56 50 32 60 Q8 50 8 30 L8 14 Z"
              fill="#0f3460" stroke="#e94560" stroke-width="2.5"/>
        <circle cx="32" cy="28" r="5" fill="#e94560"/>
        <line x1="32" y1="36" x2="32" y2="46" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Privacy Warning</h1>

    <p class="message" id="warningMessage">
      This site may compromise your privacy.
    </p>

    <div class="alternatives-section" id="alternativesSection">
      <h2>Try one of these instead</h2>
      <div class="alternatives-grid" id="alternativesGrid">
        <!-- Populated by JS -->
      </div>
      <p class="no-affiliation">No affiliation — just alternatives.</p>
    </div>

    <div class="actions">
      <button id="continueBtn" class="btn btn-secondary">Continue anyway</button>
      <button id="goBackBtn" class="btn btn-ghost">Go back</button>
    </div>

    <p class="footer-note">Powered by Redirect DG — protecting your digital privacy.</p>
  </div>

  <script src="interstitial.js"></script>
</body>
</html>
