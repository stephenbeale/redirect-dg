<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect DG</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon48.png" alt="Redirect DG" class="logo" width="28" height="28">
      <h1>Redirect DG</h1>
    </div>

    <div class="status-row">
      <span class="status-label" id="statusLabel">Active</span>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <p class="description" id="statusDescription">
      Redirecting big-tech platforms to privacy-friendly alternatives.
    </p>

    <div class="divider"></div>

    <button id="openOptions" class="options-link">
      Settings
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
